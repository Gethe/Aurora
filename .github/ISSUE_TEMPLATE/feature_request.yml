name: Feature request
description: Suggest an idea or improvement for Aurora
title: "[Feature] "
labels: enhancement
assignees: arnvid

body:
- type: checkboxes
  attributes:
    label: Is there an existing issue or discussion for this?
    description: Please search issues and discussions before submitting.
    options:
    - label: I have searched existing issues and discussions
      required: true

- type: dropdown
  attributes:
    label: Game Client
    description: Which WoW client(s) would benefit from this feature?
    multiple: true
    options:
      - Retail (Mainline)
      - Beta
      - PTR
  validations:
    required: true

- type: input
  attributes:
    label: Aurora Version
    description: The version you're currently running (so we know what baseline to work from).
    placeholder: "e.g. 9.0.0"

- type: textarea
  attributes:
    label: Problem or Motivation
    description: Is this feature request related to a problem? Describe what's frustrating or missing.
    placeholder: "I'm always frustrated when..."
  validations:
    required: true

- type: textarea
  attributes:
    label: Proposed Solution
    description: Describe what you'd like to see happen. Be as specific as possible.
  validations:
    required: true

- type: textarea
  attributes:
    label: Alternatives Considered
    description: Have you tried any workarounds or considered other approaches?

- type: textarea
  attributes:
    label: Additional Context
    description: Add any other context, mockups, or screenshots to support the request.
