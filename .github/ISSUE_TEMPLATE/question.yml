name: Question
description: Ask a question about Aurora
title: "[Question] "
labels: question
assignees: arnvid

body:
- type: checkboxes
  attributes:
    label: Did you check existing resources first?
    description: Please check before submitting — your question may already be answered.
    options:
    - label: I have searched existing issues and discussions
      required: true
    - label: I have read the README and any relevant documentation
      required: true

- type: dropdown
  attributes:
    label: Game Client
    description: Which WoW client are you running Aurora on?
    options:
      - Retail (Mainline)
      - Beta
      - PTR
  validations:
    required: true

- type: input
  attributes:
    label: Aurora Version
    description: The version you're currently running.
    placeholder: "e.g. 9.0.0"
  validations:
    required: true

- type: input
  attributes:
    label: Embedded in RealUI?
    description: Are you using Aurora standalone, or as part of RealUI?
    placeholder: "Standalone / RealUI"

- type: textarea
  attributes:
    label: Your Question
    description: Ask your question as clearly as possible.
  validations:
    required: true

- type: textarea
  attributes:
    label: What Have You Already Tried?
    description: Describe any steps you've already taken to find an answer or solve the problem yourself.

- type: textarea
  attributes:
    label: Additional Context
    description: Add any other context, screenshots, or error output that might be helpful.
